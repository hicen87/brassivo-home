<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brassivo · 投研看板导航</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2c313c;
    --txt:#e6e8ee; --mut:#9aa3b2; --hi:#f5f7fa; --warm:#e0913a; --cool:#3a9b78;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f7f9; --card:#fff; --line:#e2e5ea; --txt:#1d2129; --mut:#5f6672; --hi:#0b0d12; }
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;padding:24px}
  .wrap{max-width:680px;width:100%}
  h1{font-size:26px;font-weight:600;margin:0 0 6px;color:var(--hi)}
  .sub{color:var(--mut);font-size:14px;margin-bottom:28px}
  a.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:22px 24px;margin-bottom:16px;text-decoration:none;color:var(--txt);transition:border-color .15s, transform .15s}
  a.card:hover{border-color:var(--warm);transform:translateY(-2px)}
  .card h2{margin:0 0 6px;font-size:17px;color:var(--hi)}
  .card p{margin:0;font-size:13px;color:var(--mut);line-height:1.6}
  .tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;
    border:1px solid var(--line);color:var(--mut);margin-bottom:10px}
  .go{float:right;color:var(--warm);font-size:14px;margin-top:2px}
  .foot{color:var(--mut);font-size:11.5px;margin-top:24px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>Brassivo 投研看板</h1>
  <div class="sub">个人投研项目导航 · 数据定期自动更新</div>

  <a class="card" href="https://investment.brassivo.com">
    <span class="tag">宏观 · 周更</span><span class="go">进入 →</span>
    <h2>全球流动性周期看板</h2>
    <p>G3/G4 央行流动性同比、美元净流动性周频、五层周期定位与大类资产配置立场。</p>
  </a>

  <a class="card" href="https://stocks.brassivo.com">
    <span class="tag">个股 · 周更</span><span class="go">进入 →</span>
    <h2>AI 产业链选股表</h2>
    <p>15 个产业链环节按「质量 × 定价未充分程度」排序，含操作分层与可证伪条款。</p>
  </a>

  <div class="foot">仅为个人研究参考，非投资建议 · Brassivo Research</div>
</div>
</body>
</html>
